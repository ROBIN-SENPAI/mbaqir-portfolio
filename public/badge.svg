<svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="50" fill="#0a0a0a"/>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#f97316" stroke-width="2"/>
  
  <!-- Middle ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="#f97316" stroke-width="0.8" opacity="0.15"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#f97316"/>
  <circle cx="50" cy="50" r="9" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Vertical line -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#f97316" stroke-width="0.5" opacity="0.12"/>
  
  <!-- Horizontal line -->
  <line x1="8" y1="50" x2="92" y2="50" stroke="#f97316" stroke-width="0.5" opacity="0.12"/>
  
  <!-- Diagonal lines -->
  <line x1="20" y1="20" x2="80" y2="80" stroke="#f97316" stroke-width="0.3" opacity="0.08"/>
  <line x1="80" y1="20" x2="20" y2="80" stroke="#f97316" stroke-width="0.3" opacity="0.08"/>
  
  <!-- Cardinal nodes on outer ring -->
  <circle cx="50" cy="8" r="2.5" fill="#f97316"/>
  <circle cx="92" cy="50" r="2.5" fill="#f97316"/>
  <circle cx="50" cy="92" r="2.5" fill="#f97316"/>
  <circle cx="8" cy="50" r="2.5" fill="#f97316"/>
  
  <!-- Diagonal nodes on middle ring -->
  <circle cx="71" cy="29" r="1.5" fill="rgba(249,115,22,0.5)"/>
  <circle cx="71" cy="71" r="1.5" fill="rgba(249,115,22,0.5)"/>
  <circle cx="29" cy="71" r="1.5" fill="rgba(249,115,22,0.5)"/>
  <circle cx="29" cy="29" r="1.5" fill="rgba(249,115,22,0.5)"/>
